<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jefferson Williams</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Favicons: tab + bookmark (industry standard) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Young+Serif&family=IBM+Plex+Sans+Condensed:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans Condensed", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 2.5rem 1.5rem;
        background: #fdfdfd;
        color: #111827;
      }

      .page {
        max-width: 640px;
      }

      .logo-wrapper {
        margin-bottom: 0.75rem;
      }

      .logo {
        display: block;
        max-width: 84px;
        /* I removed this line because I wanted to */
        /* max-height: 48px; */
      }

      h1 {
        margin: 0 0 1.75rem 0;
        font-family: "Young Serif", "Times New Roman", serif;
        font-size: clamp(2rem, 3vw, 2.4rem);
        font-weight: 400;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .app-link {
        font-size: 1rem;
        text-decoration: none;
        color: #111827;
        position: relative;
      }

      .app-link::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -0.1rem;
        width: 100%;
        height: 1px;
        background: #d4d4d4;
        transform-origin: left;
        transform: scaleX(0);
        transition: transform 0.15s ease-out;
      }

      .app-link:hover::after {
        transform: scaleX(1);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="logo-wrapper">
        <img src="favicon.svg" alt="" class="logo" />
      </div>

      <h1>Jefferson Williams</h1>

      <nav class="links" aria-label="Applications">
        <a
          class="app-link"
          href="/bullion/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Bullion.
        </a>

        <a
          class="app-link"
          href="/lionship/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Lionship.
        </a>
        <a
          class="app-link"
          href="/perihelion/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Perihelion. v.0.1
        </a>
      </nav>
    </main>
  </body>
</html>
